app:
  title: "Mini-CRM Thu Cước KHDN"
  company_unit: "VNPT Long Thành - Nhơn Trạch"
  default_staff_name: "Thuận"
  default_staff_phone: "0837892579"
  default_website: "https://vnptdongnai.vn/"
  default_payment_deadline_text: "ngày 15"

database:
  path: "data/mini_crm.db"

billing:
  default_period_mode: "previous_month"
  display_format: "%m/%Y"

imports:
  tn08:
    label: "TN08 - Hóa đơn chưa thu"
    sheet_name: null
    required_fields:
      ma_tt: ["MA_TT", "Mã TT", "Mã Thanh toán", "MA THANH TOAN", "Mã thanh toán"]
      customer_name: ["TEN_TT", "Tên TT", "Tên thanh toán", "TEN_KH", "Tên khách hàng", "Khách hàng"]
      debt_amount: ["Total Nợ thu vét", "Total No thu vet", "Tổng nợ", "Tien no", "Tiền nợ", "Nợ còn lại", "Total"]
    optional_fields:
      representative_code: ["Mã đại diện", "MA_DD", "Mã ĐD", "MA_DAI_DIEN"]
      address: ["Địa chỉ", "DIA_CHI", "Địa chỉ khách hàng"]
      phone: ["Điện thoại", "SĐT", "So dien thoai", "SDT", "Phone"]

  assignment:
    label: "DS giao kỳ cước"
    sheet_name: null
    required_fields:
      ma_tt: ["MA_TT", "Mã TT", "Mã Thanh toán", "Mã thanh toán"]
    optional_fields:
      staff_name: ["Nhân viên", "NV thu", "Người phụ trách", "Tên NV", "NHAN_VIEN"]
      customer_name: ["TEN_TT", "Tên TT", "Tên thanh toán", "TEN_KH", "Tên khách hàng", "Khách hàng"]
      representative_code: ["Mã đại diện", "MA_DD", "Mã ĐD", "MA_DAI_DIEN"]
      phone: ["Điện thoại", "SĐT", "So dien thoai", "SDT", "Phone"]
      assigned_amount: ["Tiền giao", "Số tiền", "Tiền cước", "Tổng tiền", "Tien giao"]

  paid:
    label: "DS đã đóng"
    sheet_name: null
    required_fields:
      ma_tt: ["MA_TT", "Mã TT", "Mã Thanh toán", "Mã thanh toán"]
    optional_fields:
      paid_amount: ["Số tiền đã đóng", "Tiền đóng", "Số tiền", "Tien dong", "Amount"]
      paid_date: ["Ngày đóng", "Ngày thanh toán", "Ngay dong", "Payment Date"]

status_rules:
  colors:
    paid: "🟢"
    contacted_unpaid: "🟡"
    unpaid_uncontacted: "🔴"
    need_check: "⚪"
  labels:
    paid: "Đã đóng"
    contacted_unpaid: "Đã liên hệ nhưng chưa đóng"
    unpaid_uncontacted: "Chưa liên hệ / thiếu số"
    need_check: "Cần kiểm tra dữ liệu"

contact_results:
  - "Đã gọi - hẹn thanh toán"
  - "Đã gọi - xin số kế toán mới"
  - "Đã gọi - khách báo đã đóng"
  - "Không nghe máy"
  - "Sai số điện thoại"
  - "Không có số điện thoại"
  - "Cần kiểm tra lại"

message_templates:
  general_reminder: |
    {company_unit} thông báo:
    Đã có thông báo cước kỳ cước tháng {billing_period}. Anh/chị truy cập trang {website} để lấy thông báo cước và hóa đơn của công ty.
    Anh/chị vui lòng thanh toán cước trước {payment_deadline}. Sau thời hạn trên, hệ thống có thể tự động đưa vào danh sách khóa khi ghi nhận còn tồn nợ.
    Liên hệ nhân viên kinh doanh: {staff_name} - {staff_phone} để được hỗ trợ gạch nợ sớm nhất sau khi thanh toán.
    Nếu đã thanh toán cước, anh/chị vui lòng bỏ qua tin nhắn trên.
    Trân trọng.

  verified_contact_detail: |
    {company_unit} thông báo:
    Dạ em gửi anh/chị thông tin cước kỳ {billing_period} của {customer_name}.
    Tổng tiền còn cần thanh toán theo hệ thống: {debt_amount}.
    Mã thanh toán: {ma_tt}.
    Anh/chị vui lòng thanh toán trước {payment_deadline}.
    Liên hệ hỗ trợ: {staff_name} - {staff_phone}.
    Trân trọng.
